{% extends "base.html" %}

{% block content %}
<div class="content-inner" id="page_layout">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-sm-12 col-lg-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">Edit Profile</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <p>Update your personal details below.</p>
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="form-group">
                                <label class="form-label" for="name">Your Full Name:</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ user_profile.username }}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="email">Email address:</label>
                                <input type="email" class="form-control" id="email" name="email" value="{{ user_profile.email }}" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="profile">Profile Image (leave blank to keep current):</label>
                                <input type="file" class="form-control" id="profile" name="fup">
                                {% if user_profile.profile %}
                                <div class="mt-2">
                                    <img src="{{ user_profile.profile.url }}" alt="Current Profile" class="img-thumbnail" style="max-height: 100px;">
                                </div>
                                {% endif %}
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="bio">Bio:</label>
                                <textarea class="form-control" id="bio" name="bio" rows="4" required>{{ user_profile.bio }}</textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Gender:</label><br>
                                <div class="form-check form-check-inline">
                                    <input type="radio" class="form-check-input" name="gender" id="genderMale" value="male" {% if user_profile.gender|lower == 'male' %}checked{% endif %}>
                                    <label class="form-check-label" for="genderMale">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input type="radio" class="form-check-input" name="gender" id="genderFemale" value="female" {% if user_profile.gender|lower == 'female' %}checked{% endif %}>
                                    <label class="form-check-label" for="genderFemale">Female</label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="dob">Date of Birth:</label>
                                <input type="date" class="form-control" id="dob" name="dob" value="{{ user_profile.dob|date:'Y-m-d' }}" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="city">Select City:</label>
                                <select name="city" id="city" class="form-control" required>
                                    <option value="" disabled>Select a city</option>
                                    {% for c in cities %}
                                    <option value="{{ c.cityid }}" {% if user_profile.cityid.cityid == c.cityid %}selected{% endif %}>{{ c.cityname }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary mt-3">Update Profile</button>
                            <a href="{% url 'my_profile' %}" class="btn bg-danger-subtle mt-3 text-danger">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
