{% extends 'base.html' %}
{% load static %}
{% block title %}Calendar | UniVo{% endblock %}

{% block extra_css %}
<style>
    /* Styling for FullCalendar to match Univo aesthetic */
    #calendar {
        background: #ffffff;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        font-family: 'Inter', sans-serif;
    }
    .fc-toolbar-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700 !important;
        font-size: 1.5rem !important;
        color: #2b3445;
    }
    .fc-theme-standard td, .fc-theme-standard th {
        border-color: #f1f3f5;
    }
    .fc-col-header-cell-cushion {
        color: #6c757d;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.85rem;
    }
    .fc-daygrid-day-number {
        color: #495057;
        font-weight: 500;
    }
    .fc-event {
        border: none !important;
        border-radius: 6px !important;
        padding: 4px 8px !important;
        margin-top: 2px !important;
        font-size: 0.75rem !important;
        font-weight: 600 !important;
        cursor: pointer;
    }
    .fc-event-title, .fc-event-time {
        font-weight: 600 !important;
        color: inherit !important;
    }
    .event-offline { background-color: rgba(255, 99, 132, 0.15) !important; color: #ff6384 !important; }
    .event-online { background-color: rgba(54, 162, 235, 0.15) !important; color: #36a2eb !important; }
    .event-internal { background-color: rgba(75, 192, 192, 0.15) !important; color: #4bc0c0 !important; }

    .fc .fc-button-primary {
        background-color: #f8f9fa !important;
        border-color: #e9ecef !important;
        color: #495057 !important;
        text-transform: capitalize;
        font-weight: 600;
        border-radius: 8px;
        box-shadow: none !important;
    }
    .fc .fc-button-primary:hover {
        background-color: #e9ecef !important;
        color: #212529 !important;
    }
    .fc .fc-button-primary:not(:disabled):active, .fc .fc-button-primary:not(:disabled).fc-button-active {
        background-color: #3f6ad8 !important;
        border-color: #3f6ad8 !important;
        color: #fff !important;
    }
    .fc-today-button {
      background-color: #eef2ff !important;
      color: #4f46e5 !important;
      border: none !important;
    }
    .fc-day-today {
      background-color: rgba(63, 106, 216, 0.03) !important;
    }
    
    .event-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .event-offline .event-dot { background-color: #ff6384; }
    .event-online .event-dot { background-color: #36a2eb; }
    .event-internal .event-dot { background-color: #4bc0c0; }

    /* Premium Popover Styling */
    .premium-popover {
        --bs-popover-border-color: rgba(0,0,0,0.05);
        --bs-popover-header-bg: #f8f9fa;
        --bs-popover-box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border-radius: 12px;
        border: none;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .premium-popover .popover-header {
        border-bottom: 1px solid #f1f3f5;
        padding: 12px 16px;
        border-radius: 12px 12px 0 0;
    }
    .premium-popover .popover-body {
        padding: 16px;
    }
    .fc-event:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important;
        z-index: 10;
    }

</style>
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css' rel='stylesheet' />
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-sm-12 mb-4">
        <div class="d-flex align-items-center justify-content-between">
            <h2 class="fw-bold mb-0">Community Meetups Calendar</h2>
            <p class="text-muted mb-0">Stay updated with all upcoming events</p>
        </div>
        <hr class="mt-3 mb-0">
    </div>
    <div class="col-sm-12 mt-4">
        <div id='calendar'></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var meetups = {{ meetups_json|safe }};

        var calendar = new FullCalendar.Calendar(calendarEl, {
            timeZone: 'UTC',
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next title',
                right: 'today'
            },
            events: meetups,
            eventContent: function(arg) {
                var timeText = arg.event.extendedProps.time_str || '';
                var titleStr = arg.event.title;
                
                var html = `
                    <div class="fc-event-main-frame d-flex align-items-center py-1">
                        <span class="event-dot"></span>
                        <div class="fc-event-info overflow-hidden">
                            <div class="fc-event-time fw-bold" style="font-size: 0.65rem; line-height: 1;">${timeText}</div>
                            <div class="fc-event-title text-truncate" style="font-size: 0.75rem; line-height: 1.2;">${titleStr}</div>
                        </div>
                    </div>
                `;
                return { html: html };
            },
            eventDidMount: function(info) {
                // Initialize Bootstrap Popover for each event
                var props = info.event.extendedProps;
                var typeLabel = props.meetup_type.charAt(0).toUpperCase() + props.meetup_type.slice(1);
                
                var content = `
                    <div class="p-1">
                        <p class="mb-2 text-muted small">${props.description || 'No description provided.'}</p>
                        <div class="d-flex align-items-center mb-1">
                            <i class="las la-calendar me-2 text-primary"></i>
                            <span class="small fw-semibold">${props.date_str}</span>
                        </div>
                        <div class="d-flex align-items-center mb-1">
                            <i class="las la-clock me-2 text-primary"></i>
                            <span class="small fw-semibold">${props.time_str}</span>
                        </div>
                        <div class="d-flex align-items-center mb-2">
                            <i class="las la-map-marker me-2 text-primary"></i>
                            <span class="small fw-semibold text-truncate">${props.location}</span>
                        </div>
                        <div class="badge bg-primary-subtle text-primary rounded-pill px-2 py-1 small">${typeLabel}</div>
                    </div>
                `;

                new bootstrap.Popover(info.el, {
                    title: `<h6 class="fw-bold mb-0">${info.event.title}</h6>`,
                    content: content,
                    trigger: 'hover',
                    placement: 'top',
                    html: true,
                    container: 'body',
                    customClass: 'premium-popover'
                });
            },
            eventClick: function(info) {
                // Navigate to the meetup detail page when clicked
                window.location.href = '/meetup/' + info.event.extendedProps.meetupid + '/';
            }
        });
        calendar.render();
    });
</script>
{% endblock %}
