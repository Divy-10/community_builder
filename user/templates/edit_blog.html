{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Post | UniVo{% endblock %}

{% block content %}
<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-body">
                <h3 class="mb-0">Edit Post</h3>
                <p class="mb-0 text-muted">Update your post details below.</p>
            </div>
        </div>
    </div>
    <div class="col-sm-12 col-lg-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <div class="header-title">
                    <h4 class="card-title">Post Details</h4>
                </div>
            </div>
            <div class="card-body">
                <form action="{% url 'edit_blog' blog.blogid %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="title" class="form-label">Post Title</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ blog.title }}" required>
                    </div>
                    <div class="form-group">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category" required>
                            {% for cat in categories %}
                            <option value="{{ cat.categoryid }}" {% if cat.categoryid == blog.categoryid.categoryid %}selected{% endif %}>{{ cat.categoryname }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="image" class="form-label">Change Image (Optional)</label>
                        <div class="mb-2">
                            {% if blog.image %}
                                <img src="{{ blog.image.url }}" alt="current-img" style="height: 100px; border-radius: 8px;">
                            {% endif %}
                        </div>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label for="description" class="form-label">Content</label>
                        <textarea class="form-control" id="description" name="description" rows="10" required>{{ blog.description }}</textarea>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'blog_detail' blog.blogid %}" class="btn bg-soft-danger">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
