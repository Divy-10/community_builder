{% extends 'base.html' %}
{% load static %}

{% block title %}Create Post | UniVo{% endblock %}

{% block content %}
<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-body">
                <h3 class="mb-0">Create New Post</h3>
                <p class="mb-0 text-muted">Share your thoughts with the community.</p>
            </div>
        </div>
    </div>
    <div class="col-sm-12 col-lg-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <div class="header-title">
                    <h4 class="card-title">Post Details</h4>
                </div>
            </div>
            <div class="card-body">
                <form action="{% url 'add_blog' %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="title" class="form-label">Post Title</label>
                        <input type="text" class="form-control" id="title" name="title" placeholder="Enter post title" required>
                    </div>
                    <div class="form-group">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select Category</option>
                            {% for cat in categories %}
                            <option value="{{ cat.categoryid }}">{{ cat.categoryname }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="image" class="form-label">Post Image</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label for="description" class="form-label">Content</label>
                        <textarea class="form-control" id="description" name="description" rows="10" placeholder="Write your post content here..." required></textarea>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">Publish Post</button>
                        <a href="{% url 'blog_list' %}" class="btn bg-soft-danger">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
