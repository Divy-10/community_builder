{% extends "admin/index.html" %}
{% load i18n static %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* Aggressively hide default dashboard components - only the sidebar and the tables */
    #content-related, .modules-wrapper, #dashboard-models-overview { 
        display: none !important; 
    }
    
    /* Center everything flawlessly in the main content area */
    body.dashboard #content {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        text-align: center !important;
        min-height: calc(100vh - 120px) !important; /* Adjusted to account for header/breadcrumbs */
        background: transparent !important;
        overflow: hidden !important;
        width: 100%;
        margin: 0 !important;
        padding: 0 !important;
    }

    .welcome-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem; /* Larger gap for a "proper" spread */
        animation: containerReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .logo-wrapper {
        position: relative;
        width: 240px; /* Slightly larger logo */
        height: 240px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.6) rotate(-15deg);
        animation: logoReveal 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .logo-glow {
        position: absolute;
        width: 100%;
        height: 100%;
        background: var(--accent-color);
        filter: blur(50px);
        opacity: 0.25;
        border-radius: 50%;
        animation: pulseGlow 4s ease-in-out infinite;
    }

    .logo-ring {
        position: absolute;
        width: 260px;
        height: 260px;
        border: 2px solid var(--border-color);
        border-radius: 50%;
        opacity: 0.3;
        animation: orbit 20s linear infinite;
    }

    .spinning-logo {
        width: 180px !important;
        height: 180px !important;
        position: relative;
        z-index: 2;
        filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
        object-fit: contain !important;
        animation: smoothSpin 25s linear infinite;
    }

    .welcome-text-big {
        font-size: 3rem !important; /* Slightly smaller for better balance */
        font-weight: 800 !important;
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
        color: transparent !important;
        display: inline-block !important;
        letter-spacing: -1.5px !important;
        margin: 0 !important;
        opacity: 0;
        transform: translateY(20px);
        animation: textReveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    /* Refined Animations */
    @keyframes containerReveal {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes logoReveal {
        0% { opacity: 0; transform: scale(0.5) rotate(-15deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes textReveal {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes smoothSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes pulseGlow {
        0%, 100% { transform: scale(1); opacity: 0.2; }
        50% { transform: scale(1.1); opacity: 0.35; }
    }

    @keyframes orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
    }

</style>
{% endblock %}

{% block nav-sidebar %}
    {% include "admin/nav_sidebar.html" %}
{% endblock %}

{% block content %}
    <div class="welcome-container">
        <!-- Logo on Top for a "Proper" Look -->
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <div class="logo-ring"></div>
            <img src="{% static 'assets/images/animated_logo.svg' %}" class="spinning-logo" alt="UniVo Logo">
        </div>
        
        <h1 class="welcome-text-big">{{ index_title }}</h1>
    </div>
{% endblock %}
