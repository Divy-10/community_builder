<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <style>
        .connect-line {
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 3;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawLine 2.5s ease-in-out infinite alternate;
        }
        .connect-line-1 { animation-delay: 0s; }
        .connect-line-2 { animation-delay: 0.4s; }
        .connect-line-3 { animation-delay: 0.8s; }
        .connect-line-circle {
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawLine 4s ease-in-out infinite alternate;
        }
        
        .core-node {
            fill: #ffffff;
            animation: throb 2s infinite ease-in-out alternate;
            transform-origin: 50px 50px;
        }
        .outer-node {
            fill: #e0e8ff;
            animation: throb 2s infinite ease-in-out alternate;
        }
        .node-1 { transform-origin: 20px 25px; animation-delay: 0.2s; }
        .node-2 { transform-origin: 80px 25px; animation-delay: 0.6s; fill: #c0d1ff; }
        .node-3 { transform-origin: 50px 85px; animation-delay: 1.0s; fill: #a0b4ff; }
        
        .pulse-ring {
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            opacity: 0;
            transform-origin: 50px 50px;
            animation: ripple 2s infinite linear;
        }

        .pulse-ring-2 {
            animation-delay: 1s;
        }
        
        @keyframes drawLine {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes throb {
            0% { transform: scale(0.85); }
            100% { transform: scale(1.15); }
        }
        @keyframes ripple {
            0% { transform: scale(0.5); opacity: 0.8; stroke-width: 4; }
            100% { transform: scale(3.0); opacity: 0; stroke-width: 0; }
        }
    </style>
    
    <!-- Pulse Rings -->
    <circle class="pulse-ring" cx="50" cy="50" r="15" />
    <circle class="pulse-ring pulse-ring-2" cx="50" cy="50" r="15" />

    <!-- Connecting Triangle Outline -->
    <polygon class="connect-line-circle" points="20,25 80,25 50,85" />
    
    <!-- Connecting Lines -->
    <line class="connect-line connect-line-1" x1="20" y1="25" x2="50" y2="50" />
    <line class="connect-line connect-line-2" x1="80" y1="25" x2="50" y2="50" />
    <line class="connect-line connect-line-3" x1="50" y1="85" x2="50" y2="50" />
    
    <!-- Outer Nodes -->
    <circle class="outer-node node-1" cx="20" cy="25" r="10" />
    <circle class="outer-node node-2" cx="80" cy="25" r="12" />
    <circle class="outer-node node-3" cx="50" cy="85" r="14" />
    
    <!-- Core Node -->
    <circle class="core-node" cx="50" cy="50" r="16" />
    
    <!-- Inner Core Detail -->
    <circle cx="50" cy="50" r="7" fill="#506fe4" />
</svg>
