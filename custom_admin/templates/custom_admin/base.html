<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(18, 24, 38, 0.6);
            --surface-hover: rgba(26, 35, 53, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-color: #8b5cf6;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --glass-blur: blur(12px);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand i {
            -webkit-text-fill-color: #8b5cf6;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-primary);
            background: var(--surface-hover);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 60%;
            width: 4px;
            background: var(--accent-gradient);
            border-radius: 0 4px 4px 0;
        }

        .nav-item i {
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .nav-item:hover i {
            transform: scale(1.1);
            color: var(--accent-color);
        }

        .logout-btn {
            margin-top: auto;
            color: var(--danger-color);
            background: rgba(239, 68, 68, 0.1);
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        /* Main Content Area */
        .main-wrapper {
            margin-left: 280px;
            flex-grow: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            min-width: 0; /* Prevents overflow */
        }

        /* Topbar */
        .topbar {
            background: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
        }

        /* Reusable Components */
        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        
        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-wrapper {
                margin-left: 0;
            }
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-bolt"></i>
            <span>Univo Super admin</span>
        </div>
        
        <nav class="nav-menu">
            <a href="{% url 'custom_admin:dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fa-solid fa-chart-pie"></i>
                Dashboard
            </a>
            <a href="{% url 'custom_admin:users' %}" class="nav-item {% if request.resolver_match.url_name == 'users' %}active{% endif %}">
                <i class="fa-solid fa-users"></i>
                Users
            </a>
            <a href="{% url 'custom_admin:communities' %}" class="nav-item {% if request.resolver_match.url_name == 'communities' %}active{% endif %}">
                <i class="fa-solid fa-layer-group"></i>
                Communities
            </a>
            <a href="{% url 'custom_admin:posts' %}" class="nav-item {% if request.resolver_match.url_name == 'posts' %}active{% endif %}">
                <i class="fa-solid fa-images"></i>
                Posts
            </a>
            <a href="{% url 'custom_admin:meetups' %}" class="nav-item {% if request.resolver_match.url_name == 'meetups' %}active{% endif %}">
                <i class="fa-solid fa-calendar-days"></i>
                Meetups
            </a>
            
            <a href="/admin/" class="nav-item" style="color: #f59e0b;">
                <i class="fa-solid fa-sliders"></i>
                UniVo Administration
            </a>
            
            <a href="/" class="nav-item logout-btn" style="margin-top: auto;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                Exit to Site
            </a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="user-profile">
                <div style="text-align: right;">
                    <div style="font-weight: 500;">{{ request.user.username|default:"Super Admin" }}</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary);">System Administrator</div>
                </div>
                <div class="avatar">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
            </div>
        </header>

        {% block content %}
        {% endblock %}
    </main>
    
    {% block extra_js %}{% endblock %}
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    const term = e.target.value.toLowerCase();
                    const table = document.querySelector('.modern-table');
                    if (!table) return;
                    
                    const rows = table.querySelectorAll('tbody tr');
                    let visibleCount = 0;
                    
                    rows.forEach(row => {
                        // Skip empty state row if it exists
                        const emptyCell = row.querySelector('td[colspan]');
                        if (emptyCell && emptyCell.textContent.includes('No')) {
                            row.style.display = 'none';
                            return;
                        }
                        
                        const text = row.textContent.toLowerCase();
                        if (text.includes(term)) {
                            row.style.display = '';
                            visibleCount++;
                        } else {
                            row.style.display = 'none';
                        }
                    });
                    
                    // Handle empty state manually if everything filtered out
                    let noResultsRow = table.querySelector('.no-results-row');
                    if (visibleCount === 0 && term.length > 0) {
                        if (!noResultsRow) {
                            const tbody = table.querySelector('tbody');
                            const cols = table.querySelectorAll('thead th').length;
                            const tr = document.createElement('tr');
                            tr.className = 'no-results-row';
                            tr.innerHTML = `<td colspan="${cols}" style="text-align: center; padding: 3rem; color: var(--text-secondary);">No matches found for "${term}".</td>`;
                            tbody.appendChild(tr);
                        } else {
                            noResultsRow.style.display = '';
                            noResultsRow.querySelector('td').textContent = `No matches found for "${term}".`;
                        }
                    } else if (noResultsRow) {
                        noResultsRow.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>
</html>
